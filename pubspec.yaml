name: flutter_kaptura
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.8.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  logger: ^2.4.0
  flutter_dotenv: ^5.2.1
